<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Crossmedia</title>
  </head>

  <body>
    <div id="messageView">
      <header>
        <div id="headerBack"><img src="icons/arrowback.svg" /></div>
        <div id="headerProfile">
          <img src="icons/contacticon.svg" />
          <p>Anna</p>
        </div>
        <div id="headerCall"><img src="icons/videocall.svg" /></div>
      </header>
      <main>
        <div id="chatWindow">
          <div class="chatTime">idag 10:55</div>
          <div class="chatThey">Hej</div>
          <div class="chatMe">Hej Anna</div>
        </div>
      </main>
    </div>
    <!------->
    <div id="allMessagesView">
      <h1>Meddelanden</h1>
      <div id="messagesContainer">
        <div class="messagePerson">
          <div class="profilePicture" id="unknown"></div>
          <div>
            <h4>Okänt nummer</h4>
            <p class="messageText">
              Lorem ipsum dolor sit amet, consectetur adipiscing elit.
            </p>
          </div>
        </div>
        <div class="messagePerson">
          <div class="profilePicture" id="johannez"></div>
          <div class="nameAndMessageContainer">
            <h4>Johannez</h4>
            <p class="messageText">design</p>
          </div>
        </div>
      </div>
    </div>
    <!-- script -->
    <script src="script.js"></script>
  </body>
</html>
